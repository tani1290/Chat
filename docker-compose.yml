version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: chat_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - chat_network

  redis:
    image: redis:alpine
    container_name: chat_redis
    ports:
      - "6379:6379"
    networks:
      - chat_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chat_backend
    ports:
      - "5001:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/chatdb
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretkey_chat_app_123
    depends_on:
      - mongodb
      - redis
    networks:
      - chat_network
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  python_service:
    build:
      context: ./python_service
      dockerfile: Dockerfile
    container_name: chat_python_service
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - chat_network
    volumes:
      - ./python_service:/usr/src/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chat_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5001
    depends_on:
      - backend
    networks:
      - chat_network
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules

networks:
  chat_network:
    driver: bridge

volumes:
  mongo_data:
